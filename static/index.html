<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码文档生成工具 V1.1</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{background: #f5f7fa;font-family: Microsoft YaHei,sans-serif;padding: 30px;}
        .container{max-width: 1200px;margin: 0 auto;}
        .header{padding-bottom: 15px;border-bottom: 1px solid #e2e8f0;margin-bottom: 25px;}
        .header h2{color: #222;font-weight: 500;}
        .header p{color: #666;font-size: 14px;margin-top: 6px;}
        .card{background: #fff;border-radius: 8px;padding: 24px;margin-bottom: 20px;box-shadow: 0 2px 8px rgba(0,0,0,0.06);}
        .input-area input{width: 330px;height: 40px;padding: 0 12px;border: 1px solid #ddd;border-radius: 4px;font-size: 14px;margin-right: 10px;}
        .btn{height: 40px;padding: 0 20px;border: none;border-radius: 4px;cursor: pointer;font-size: 14px;}
        .btn-add{background: #407bff;color: #fff;}
        .btn-del{background: #f53f3f;color: #fff;}
        .project-item{display: flex;justify-content: space-between;align-items: center;padding: 16px 0;border-bottom: 1px solid #f1f1f1;}
        .info-text p{font-size: 15px;color: #333;}
        .info-text span{font-size: 13px;color: #888;display: block;margin-top: 4px;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>代码文档管理工具</h2>
        <p>Python Flask后端 | Git源码拉取 & 自动化文档生成</p>
    </div>

    <div class="card">
        <div class="input-area">
            <input type="text" id="projName" placeholder="输入项目名称">
            <input type="text" id="gitAddr" placeholder="粘贴Git仓库地址">
            <button class="btn btn-add" onclick="addNewProject()">添加项目</button>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 16px;font-weight: 500;color: #333;">项目列表</h3>
        <div id="projectList"></div>
    </div>
</div>

<script src="/static/js/common.js"></script>
</body>
</html>
